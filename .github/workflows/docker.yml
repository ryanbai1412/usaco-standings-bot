name: Docker image

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Fork PRs can't push to GHCR (no write token), so only build for those.
      - name: Decide whether to push
        id: push
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && \
             [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.push.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ steps.push.outputs.enabled == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print release command
        run: |
          REF="${{ env.IMAGE }}:${{ github.sha }}"
          if [ "${{ steps.push.outputs.enabled }}" = "true" ]; then
            {
              echo "## Release this image to Dokku"
              echo ""
              echo "Image pushed: \`$REF\`"
              echo ""
              echo "Run this to deploy this exact build (replace the SSH host):"
              echo ""
              echo '```sh'
              echo "ssh <your-dokku-host> \"dokku git:from-image usaco-standings-bot $REF && dokku ps:scale usaco-standings-bot bot=1\""
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Image built but not pushed (fork PR) — no release command." >> "$GITHUB_STEP_SUMMARY"
          fi
